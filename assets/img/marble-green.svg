<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="gbody" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.016" numOctaves="5" seed="14" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.10
                0 0 0 0 0.34
                0 0 0 0 0.25
                0 0 0 -0.9 0.95"/>
    </filter>
    <filter id="gveins" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.006 0.03" numOctaves="4" seed="31" result="v"/>
      <feColorMatrix in="v" type="matrix"
        values="0 0 0 0 0.85
                0 0 0 0 0.95
                0 0 0 0 0.88
                0 0 0 -2.4 1.25"/>
    </filter>
    <linearGradient id="gbase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f7a5a"/>
      <stop offset="55%" stop-color="#155c43"/>
      <stop offset="100%" stop-color="#0e4732"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#gbase)"/>
  <rect width="600" height="600" filter="url(#gbody)" opacity="0.6"/>
  <rect width="600" height="600" filter="url(#gveins)" opacity="0.5"/>
</svg>
